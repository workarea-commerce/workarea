name: Weekly security scan

on:
  schedule:
    # Weekly (Mondays at 09:00 UTC)
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  security_scan:
    name: Brakeman + bundler-audit (next)
    runs-on: ubuntu-latest
    concurrency:
      group: weekly-security-scan
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          ref: next

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          bundler-cache: true

      - name: brakeman (new warnings only)
        run: bundle exec brakeman --quiet --compare core/brakeman.baseline.json core

      - name: bundler-audit
        run: bundle exec bundler-audit check --update --config .bundler-audit.yml

  notify_failure:
    name: Open issue on scan failure
    needs: security_scan
    # Only runs when security_scan fails; skipped on success.
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl =
              `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const today = new Date().toISOString().slice(0, 10);
            const title = `Security scan failed (${today})`;

            const body = [
              '## :warning: Weekly security scan failed',
              '',
              `The weekly Brakeman + bundler-audit scan failed on \`${context.ref}\`.`,
              '',
              `**Failed run:** ${runUrl}`,
              '',
              'Please review the scan output and remediate any findings.',
              'Close this issue once resolved.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security'],
            });
