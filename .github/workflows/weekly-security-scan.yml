name: Weekly security scan

on:
  schedule:
    # Weekly (Mondays at 09:00 UTC)
    - cron: '0 9 * * 1'
  workflow_dispatch:

# Minimal token scope: read-only checkout for the security_scan job.
# The notify_failure job overrides to issues: write (job-level) to open
# a tracking issue — only that job receives the elevated scope.
permissions:
  contents: read

jobs:
  security_scan:
    name: Brakeman + bundler-audit (next)
    runs-on: ubuntu-latest
    concurrency:
      group: weekly-security-scan
      cancel-in-progress: false

    steps:
      # Pinned to commit SHA for supply-chain safety — this is a security
      # workflow, so reproducibility matters most here.
      # actions/checkout v4 → 34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: next

      # ruby/setup-ruby v1.292.0 → 4eb9f110bac952a8b68ecf92e3b5c7a987594ba6
      - uses: ruby/setup-ruby@4eb9f110bac952a8b68ecf92e3b5c7a987594ba6
        with:
          ruby-version: 3.2
          bundler-cache: true

      - name: brakeman – core (new warnings only)
        run: bundle exec brakeman --quiet --compare core/brakeman.baseline.json core

      - name: brakeman – admin (new warnings only)
        run: bundle exec brakeman --quiet --compare admin/brakeman.baseline.json admin

      - name: brakeman – storefront (new warnings only)
        run: bundle exec brakeman --quiet --compare storefront/brakeman.baseline.json storefront

      - name: bundler-audit
        run: bundle exec bundler-audit check --update --config .bundler-audit.yml

  notify_failure:
    name: Open issue on scan failure
    needs: security_scan
    # Only runs when security_scan fails; skipped on success.
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create failure issue
        # actions/github-script v7.1.0 → f28e40c7f34bde8b3046d885e986cb6290c5673b
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const branch = context.ref.replace(/^refs\/heads\//, '');
            const runUrl =
              `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const today = new Date().toISOString().slice(0, 10);
            const title = `Security scan failed (${today})`;

            // Avoid creating a duplicate issue if one is already open for this week.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security',
              state: 'open',
              per_page: 20,
            });
            const alreadyOpen = existing.data.some(
              (issue) => issue.title.startsWith('Security scan failed')
            );
            if (alreadyOpen) {
              core.info('An open security scan failure issue already exists — skipping creation.');
              return;
            }

            const body = [
              '## :warning: Weekly security scan failed',
              '',
              `The weekly Brakeman + bundler-audit scan failed on \`${branch}\`.`,
              '',
              `**Failed run:** ${runUrl}`,
              '',
              'Please review the scan output and remediate any findings.',
              'Close this issue once resolved.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security'],
            });
