name: CI
on:
  push:
    paths-ignore:
      - 'demo/**'
      - 'docs/**'
      - '**.md'
  pull_request:
    paths-ignore:
      - 'demo/**'
      - 'docs/**'
      - '**.md'

# Minimal token scope: read-only access to the repository.
# Individual jobs that need additional permissions (e.g. artifact upload)
# are not required to add them because artifact storage uses the separate
# ACTIONS_RUNTIME_TOKEN rather than GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck (script/*)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install ShellCheck
      run: sudo apt-get update && sudo apt-get install -y shellcheck

    - name: shellcheck
      run: shellcheck script/*

  static_analysis:
    runs-on: ubuntu-latest
    steps:
    # Pinned to commit SHA for supply-chain safety (this job runs security
    # tooling — bundler-audit — so reproducibility matters most here).
    # actions/checkout v4 → 34e114876b0b11c390a56381ad16ebd13914f8d5
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    # Run Ruby-based static analysis on the same Ruby version as the rest of CI.
    # The docker-based workarea-commerce/ci/* actions are pinned to ruby:2.6,
    # which cannot bundle workarea-core (>= 2.7).
    # ruby/setup-ruby v1.292.0 → 4eb9f110bac952a8b68ecf92e3b5c7a987594ba6
    - uses: ruby/setup-ruby@4eb9f110bac952a8b68ecf92e3b5c7a987594ba6
      with:
        ruby-version: 3.2
        bundler-cache: true

    - name: bundler-audit
      run: bundle exec bundler-audit check --update --config .bundler-audit.yml

    # Run Brakeman static analysis against core/ using the committed baseline so
    # only *new* high-confidence findings fail the build.
    #
    # To run the same check locally:
    #   bundle exec brakeman --quiet --compare core/brakeman.baseline.json core
    #
    # To regenerate the baseline after resolving existing findings:
    #   bundle exec brakeman --quiet -o core/brakeman.baseline.json core
    - name: brakeman
      run: bundle exec brakeman --quiet --compare core/brakeman.baseline.json core

    - name: rubocop
      run: bundle exec rubocop

    - uses: workarea-commerce/ci/eslint@v1
      with:
        args: '{admin,core,storefront}/{app,test}/**/*.js'
    - uses: workarea-commerce/ci/stylelint@v1
      with:
        args: '{admin,core,storefront}/{app,test}/**/*.scss'

  bundler_audit:
    name: bundler-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    # Pinned to commit SHA for supply-chain safety (this job runs security
    # tooling — bundler-audit — so reproducibility matters most here).
    # actions/checkout v4 → 34e114876b0b11c390a56381ad16ebd13914f8d5
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    # ruby/setup-ruby v1.292.0 → 4eb9f110bac952a8b68ecf92e3b5c7a987594ba6
    - uses: ruby/setup-ruby@4eb9f110bac952a8b68ecf92e3b5c7a987594ba6
      with:
        ruby-version: 3.2

    - name: Install bundler-audit
      run: gem install bundler-audit

    - name: Update advisory database
      run: bundle-audit update

    - name: Run bundler-audit
      run: |
        # If this fails, a vulnerability was found in Gemfile.lock.
        # Fix by updating gems (preferred) or acknowledging advisories in
        # .bundler-audit.yml (e.g. when a fix is not yet available).
        bundle-audit check --config .bundler-audit.yml

  admin_tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2
        bundler-cache: true

    - name: Install system deps (docker-compose + ImageMagick)
      run: sudo apt-get update && sudo apt-get install -y docker-compose imagemagick
    - uses: workarea-commerce/ci/test@v1
      with:
        command: cd admin && bin/rails test -b

  admin_teaspoon:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2
        bundler-cache: true

    - name: Install system deps (docker-compose + ImageMagick)
      run: sudo apt-get update && sudo apt-get install -y docker-compose imagemagick
    - uses: workarea-commerce/ci/test@v1
      with:
        command: cd admin && bin/rails teaspoon

  admin_system_tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2
        bundler-cache: true

    - name: Install system deps (docker-compose + ImageMagick)
      run: sudo apt-get update && sudo apt-get install -y docker-compose imagemagick
    - uses: workarea-commerce/ci/test@v1
      with:
        command: cd admin && bin/rails test test/system/**/*_test.rb -b
    - uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: Admin Screenshots
        path: admin/test/dummy/tmp/screenshots

  core_teaspoon:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2
        bundler-cache: true

    - name: Install system deps (docker-compose + ImageMagick)
      run: sudo apt-get update && sudo apt-get install -y docker-compose imagemagick
    - uses: workarea-commerce/ci/test@v1
      with:
        command: cd core && bin/rails teaspoon

  core_tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2
        bundler-cache: true

    - name: Install system deps (docker-compose + ImageMagick)
      run: sudo apt-get update && sudo apt-get install -y docker-compose imagemagick
    - uses: workarea-commerce/ci/test@v1
      with:
        command: cd core && bin/rails test test/**/*_test.rb -b

  storefront_tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2
        bundler-cache: true

    - name: Install system deps (docker-compose + ImageMagick)
      run: sudo apt-get update && sudo apt-get install -y docker-compose imagemagick
    - uses: workarea-commerce/ci/test@v1
      with:
        command: cd storefront && bin/rails test -b

  storefront_teaspoon:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2
        bundler-cache: true

    - name: Install system deps (docker-compose + ImageMagick)
      run: sudo apt-get update && sudo apt-get install -y docker-compose imagemagick
    - uses: workarea-commerce/ci/test@v1
      with:
        command: cd storefront && bin/rails teaspoon

  storefront_system_tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2
        bundler-cache: true

    - name: Install system deps (docker-compose + ImageMagick)
      run: sudo apt-get update && sudo apt-get install -y docker-compose imagemagick
    - uses: workarea-commerce/ci/test@v1
      with:
        command: cd storefront && bin/rails test test/system/**/*_test.rb -b
    - uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: Storefront Screenshots
        path: storefront/test/dummy/tmp/screenshots

  zeitwerk_verification:
    name: "Zeitwerk autoload verification"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2
        bundler-cache: true

    - name: Install system deps (docker-compose + ImageMagick)
      run: sudo apt-get update && sudo apt-get install -y docker-compose imagemagick

    - name: Start services
      run: docker-compose up -d

    - name: Verify Zeitwerk autoloading
      run: bash script/default_appraisal_zeitwerk_check

  ruby_33_full_suite:
    name: "Ruby 3.3 — full test suite"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true

    - name: Install system deps (docker-compose + ImageMagick)
      run: sudo apt-get update && sudo apt-get install -y docker-compose imagemagick

    - uses: workarea-commerce/ci/test@v1
      with:
        command: bundle exec rake test

  # Rails compatibility matrix — provides signal for upcoming Rails upgrades.
  rails_compatibility:
    name: "Rails ${{ matrix.rails }} — test"
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rails: "6.1 (default)"
            gemfile: Gemfile
            experimental: false
          - rails: "7.0"
            gemfile: gemfiles/rails_7_0.gemfile
            experimental: true
          - rails: "7.1"
            gemfile: gemfiles/rails_7_1.gemfile
            experimental: true
          - rails: "7.2"
            gemfile: gemfiles/rails_7_2.gemfile
            experimental: true
    env:
      BUNDLE_GEMFILE: ${{ matrix.gemfile }}
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2
        # For experimental entries, allow bundling to fail without breaking the job.
        bundler-cache: false

    - name: Bundle install
      id: bundle
      run: bundle install
      continue-on-error: ${{ matrix.experimental }}

    - name: Install system deps (docker-compose + ImageMagick)
      run: sudo apt-get update && sudo apt-get install -y docker-compose imagemagick

    - uses: workarea-commerce/ci/test@v1
      if: steps.bundle.outcome == 'success'
      with:
        command: bundle exec rake test

    - name: Warn on experimental bundle failures
      if: steps.bundle.outcome != 'success' && matrix.experimental
      run: echo "::warning::bundle install failed for Rails ${{ matrix.rails }} (informational — experimental version)"

  # Ruby compatibility matrix — tracks Workarea bundling health across Ruby versions.
  # Ruby 2.7: legacy baseline (Docker-pinned CI actions run ruby:2.6 internally).
  # Ruby 3.2: current stable target — must pass (continue-on-error: false).
  # Ruby 3.3: now expected to pass (bundle + tests are green).
  # Ruby 3.4: informational — failures are expected until compat work lands.
  ruby_compatibility:
    name: "Ruby ${{ matrix.ruby-version }} — bundle check"
    runs-on: ubuntu-latest
    # continue-on-error is set per-matrix-entry via the include block below.
    # For 3.2 this defaults to false (must pass); for 3.3/3.4 it is true (informational).
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ['2.7', '3.2', '3.3', '3.4']
        include:
          # 2.7 — EOL but retained for baseline visibility; expected to fail on Nokogiri/YJIT warnings
          - ruby-version: '2.7'
            experimental: true
          # 3.2 — current stable target
          - ruby-version: '3.2'
            experimental: false
          # 3.3 — stable target
          - ruby-version: '3.3'
            experimental: false
          # 3.4 — informational until compat fixes land
          - ruby-version: '3.4'
            experimental: true
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby-version }}
        bundler-cache: false
    - name: bundle install
      run: |
        bundle install || {
          if [[ "${{ matrix.experimental }}" == "true" ]]; then
            echo "::warning::bundle install failed on Ruby ${{ matrix.ruby-version }} (informational — experimental version)"
            exit 0
          fi
          exit 1
        }
