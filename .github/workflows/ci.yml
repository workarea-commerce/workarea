name: CI

# CI uses Ruby 2.7.8 (>= 2.7 required by workarea-core).
# Bundler is pinned to match Gemfile.lock and maintain Ruby 2.7 compatibility.
env:
  RUBY_VERSION: 2.7.8
  BUNDLER_VERSION: 2.4.22

on:
  push:
    paths-ignore:
      - 'demo/**'
      - 'docs/**'
      - '**.md'
  pull_request:
    branches:
      - next
    paths-ignore:
      - 'demo/**'
      - 'docs/**'
      - '**.md'

jobs:
  static_analysis:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler: ${{ env.BUNDLER_VERSION }}
        bundler-cache: true
    - name: Bundler Audit
      run: bundle exec bundle audit check --update --ignore CVE-2020-8161
    - name: Rubocop
      run: bundle exec rubocop
    - uses: workarea-commerce/ci/eslint@v1
      with:
        args: '{admin,core,storefront}/{app,test}/**/*.js'
    - uses: workarea-commerce/ci/stylelint@v1
      with:
        args: '{admin,core,storefront}/{app,test}/**/*.scss'

  admin_tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler: ${{ env.BUNDLER_VERSION }}
        bundler-cache: true
    - name: Start services
      run: bundle exec rake services:up
    - name: Wait for Elasticsearch
      run: timeout 300 bash -c 'while [[ "$(curl -s -o /dev/null -w "%{http_code}" localhost:9200)" != "200" ]]; do sleep 1; done' || false
    - name: Run tests
      run: cd admin && bin/rails test -b

  admin_teaspoon:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler: ${{ env.BUNDLER_VERSION }}
        bundler-cache: true
    - name: Start services
      run: bundle exec rake services:up
    - name: Wait for Elasticsearch
      run: timeout 300 bash -c 'while [[ "$(curl -s -o /dev/null -w "%{http_code}" localhost:9200)" != "200" ]]; do sleep 1; done' || false
    - name: Run tests
      run: cd admin && bin/rails teaspoon

  admin_system_tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler: ${{ env.BUNDLER_VERSION }}
        bundler-cache: true
    - name: Start services
      run: bundle exec rake services:up
    - name: Wait for Elasticsearch
      run: timeout 300 bash -c 'while [[ "$(curl -s -o /dev/null -w "%{http_code}" localhost:9200)" != "200" ]]; do sleep 1; done' || false
    - name: Run tests
      run: cd admin && bin/rails test test/system/**/*_test.rb -b
    - uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: Admin Screenshots
        path: admin/test/dummy/tmp/screenshots

  core_teaspoon:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler: ${{ env.BUNDLER_VERSION }}
        bundler-cache: true
    - name: Start services
      run: bundle exec rake services:up
    - name: Wait for Elasticsearch
      run: timeout 300 bash -c 'while [[ "$(curl -s -o /dev/null -w "%{http_code}" localhost:9200)" != "200" ]]; do sleep 1; done' || false
    - name: Run tests
      run: cd core && bin/rails teaspoon

  core_tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler: ${{ env.BUNDLER_VERSION }}
        bundler-cache: true
    - name: Start services
      run: bundle exec rake services:up
    - name: Wait for Elasticsearch
      run: timeout 300 bash -c 'while [[ "$(curl -s -o /dev/null -w "%{http_code}" localhost:9200)" != "200" ]]; do sleep 1; done' || false
    - name: Run tests
      run: cd core && bin/rails test test/**/*_test.rb -b

  storefront_tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler: ${{ env.BUNDLER_VERSION }}
        bundler-cache: true
    - name: Start services
      run: bundle exec rake services:up
    - name: Wait for Elasticsearch
      run: timeout 300 bash -c 'while [[ "$(curl -s -o /dev/null -w "%{http_code}" localhost:9200)" != "200" ]]; do sleep 1; done' || false
    - name: Run tests
      run: cd storefront && bin/rails test -b

  storefront_teaspoon:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler: ${{ env.BUNDLER_VERSION }}
        bundler-cache: true
    - name: Start services
      run: bundle exec rake services:up
    - name: Wait for Elasticsearch
      run: timeout 300 bash -c 'while [[ "$(curl -s -o /dev/null -w "%{http_code}" localhost:9200)" != "200" ]]; do sleep 1; done' || false
    - name: Run tests
      run: cd storefront && bin/rails teaspoon

  storefront_system_tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler: ${{ env.BUNDLER_VERSION }}
        bundler-cache: true
    - name: Start services
      run: bundle exec rake services:up
    - name: Wait for Elasticsearch
      run: timeout 300 bash -c 'while [[ "$(curl -s -o /dev/null -w "%{http_code}" localhost:9200)" != "200" ]]; do sleep 1; done' || false
    - name: Run tests
      run: cd storefront && bin/rails test test/system/**/*_test.rb -b
    - uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: Storefront Screenshots
        path: storefront/test/dummy/tmp/screenshots
