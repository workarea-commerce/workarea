name: CI
on:
  push:
    paths-ignore:
      - 'demo/**'
      - 'docs/**'
      - '**.md'

jobs:
  shellcheck:
    name: ShellCheck (script/*)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install ShellCheck
      run: sudo apt-get update && sudo apt-get install -y shellcheck

    - name: shellcheck
      run: shellcheck script/*

  static_analysis:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # Run Ruby-based static analysis on the same Ruby version as the rest of CI.
    # The docker-based workarea-commerce/ci/* actions are pinned to ruby:2.6,
    # which cannot bundle workarea-core (>= 2.7).
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2
        bundler-cache: true

    - name: bundler-audit
      run: bundle exec bundler-audit check --update --config .bundler-audit.yml

    - name: rubocop
      run: bundle exec rubocop

    - uses: workarea-commerce/ci/eslint@v1
      with:
        args: '{admin,core,storefront}/{app,test}/**/*.js'
    - uses: workarea-commerce/ci/stylelint@v1
      with:
        args: '{admin,core,storefront}/{app,test}/**/*.scss'

  admin_tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2
        bundler-cache: true

    - name: Install system deps (docker-compose + ImageMagick)
      run: sudo apt-get update && sudo apt-get install -y docker-compose imagemagick
    - uses: workarea-commerce/ci/test@v1
      with:
        command: cd admin && bin/rails test -b

  admin_teaspoon:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2
        bundler-cache: true

    - name: Install system deps (docker-compose + ImageMagick)
      run: sudo apt-get update && sudo apt-get install -y docker-compose imagemagick
    - uses: workarea-commerce/ci/test@v1
      with:
        command: cd admin && bin/rails teaspoon

  admin_system_tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2
        bundler-cache: true

    - name: Install system deps (docker-compose + ImageMagick)
      run: sudo apt-get update && sudo apt-get install -y docker-compose imagemagick
    - uses: workarea-commerce/ci/test@v1
      with:
        command: cd admin && bin/rails test test/system/**/*_test.rb -b
    - uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: Admin Screenshots
        path: admin/test/dummy/tmp/screenshots

  core_teaspoon:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2
        bundler-cache: true

    - name: Install system deps (docker-compose + ImageMagick)
      run: sudo apt-get update && sudo apt-get install -y docker-compose imagemagick
    - uses: workarea-commerce/ci/test@v1
      with:
        command: cd core && bin/rails teaspoon

  core_tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2
        bundler-cache: true

    - name: Install system deps (docker-compose + ImageMagick)
      run: sudo apt-get update && sudo apt-get install -y docker-compose imagemagick
    - uses: workarea-commerce/ci/test@v1
      with:
        command: cd core && bin/rails test test/**/*_test.rb -b

  storefront_tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2
        bundler-cache: true

    - name: Install system deps (docker-compose + ImageMagick)
      run: sudo apt-get update && sudo apt-get install -y docker-compose imagemagick
    - uses: workarea-commerce/ci/test@v1
      with:
        command: cd storefront && bin/rails test -b

  storefront_teaspoon:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2
        bundler-cache: true

    - name: Install system deps (docker-compose + ImageMagick)
      run: sudo apt-get update && sudo apt-get install -y docker-compose imagemagick
    - uses: workarea-commerce/ci/test@v1
      with:
        command: cd storefront && bin/rails teaspoon

  storefront_system_tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2
        bundler-cache: true

    - name: Install system deps (docker-compose + ImageMagick)
      run: sudo apt-get update && sudo apt-get install -y docker-compose imagemagick
    - uses: workarea-commerce/ci/test@v1
      with:
        command: cd storefront && bin/rails test test/system/**/*_test.rb -b
    - uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: Storefront Screenshots
        path: storefront/test/dummy/tmp/screenshots

  ruby_33_full_suite:
    name: "Ruby 3.3 — full test suite"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true

    - name: Install system deps (docker-compose + ImageMagick)
      run: sudo apt-get update && sudo apt-get install -y docker-compose imagemagick

    - uses: workarea-commerce/ci/test@v1
      with:
        command: bundle exec rake test

  # Rails compatibility matrix — provides signal for upcoming Rails upgrades.
  rails_compatibility:
    name: "Rails ${{ matrix.rails }} — test"
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rails: "6.1 (default)"
            gemfile: Gemfile
            experimental: false
          - rails: "7.0"
            gemfile: gemfiles/rails_7_0.gemfile
            experimental: true
          - rails: "7.1"
            gemfile: gemfiles/rails_7_1.gemfile
            experimental: true
    env:
      BUNDLE_GEMFILE: ${{ matrix.gemfile }}
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2
        # For experimental entries, allow bundling to fail without breaking the job.
        bundler-cache: false

    - name: Bundle install
      id: bundle
      run: bundle install
      continue-on-error: ${{ matrix.experimental }}

    - name: Install system deps (docker-compose + ImageMagick)
      run: sudo apt-get update && sudo apt-get install -y docker-compose imagemagick

    - uses: workarea-commerce/ci/test@v1
      if: steps.bundle.outcome == 'success'
      with:
        command: bundle exec rake test

    - name: Warn on experimental bundle failures
      if: steps.bundle.outcome != 'success' && matrix.experimental
      run: echo "::warning::bundle install failed for Rails ${{ matrix.rails }} (informational — experimental version)"

  # Ruby compatibility matrix — tracks Workarea bundling health across Ruby versions.
  # Ruby 2.7: legacy baseline (Docker-pinned CI actions run ruby:2.6 internally).
  # Ruby 3.2: current stable target — must pass (continue-on-error: false).
  # Ruby 3.3: now expected to pass (bundle + tests are green).
  # Ruby 3.4: informational — failures are expected until compat work lands.
  ruby_compatibility:
    name: "Ruby ${{ matrix.ruby-version }} — bundle check"
    runs-on: ubuntu-latest
    # continue-on-error is set per-matrix-entry via the include block below.
    # For 3.2 this defaults to false (must pass); for 3.3/3.4 it is true (informational).
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ['2.7', '3.2', '3.3', '3.4']
        include:
          # 2.7 — EOL but retained for baseline visibility; expected to fail on Nokogiri/YJIT warnings
          - ruby-version: '2.7'
            experimental: true
          # 3.2 — current stable target
          - ruby-version: '3.2'
            experimental: false
          # 3.3 — stable target
          - ruby-version: '3.3'
            experimental: false
          # 3.4 — informational until compat fixes land
          - ruby-version: '3.4'
            experimental: true
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby-version }}
        bundler-cache: false
    - name: bundle install
      run: |
        bundle install || {
          if [[ "${{ matrix.experimental }}" == "true" ]]; then
            echo "::warning::bundle install failed on Ruby ${{ matrix.ruby-version }} (informational — experimental version)"
            exit 0
          fi
          exit 1
        }
